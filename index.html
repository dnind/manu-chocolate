<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANU BARK CHOCOLATE</title>
    <style>
        /* 🎨 노티드 스타일 컬러 팔레트 & 공통 디자인 */
        :root {
            --knotted-yellow: #FFD400;
            --bg-cream: #FDF6E3;
            --border-color: #b5b0a3;
            --radius-large: 40px;
        }

        body {
            margin: 0;
            background-color: var(--bg-cream);
            font-family: 'Arial', sans-serif;
            color: #333;
            overflow-x: hidden;
        }

        header {
            background: #fff;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #eee;
        }

        .logo { font-size: 28px; font-weight: 900; letter-spacing: 3px; cursor: pointer; }

        nav a {
            text-decoration: none;
            color: #333;
            margin-left: 25px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: color 0.2s;
        }
        nav a:hover { color: var(--knotted-yellow); }

        .slider-container {
            width: 100%;
            height: 400px;
            overflow: hidden;
            position: relative;
            background: #fff;
        }
        .slides {
            display: flex;
            width: 300%;
            height: 100%;
            transition: transform 0.5s ease-in-out;
        }
        .slide {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: bold;
        }
        .slide:nth-child(1) { background-color: #FFF9C4; }
        .slide:nth-child(2) { background-color: #FFECB3; }
        .slide:nth-child(3) { background-color: #FFE082; }

        section { display: none; padding: 40px 5%; }
        section.active { display: block; animation: fadeIn 0.5s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .order-wrapper { max-width: 500px; margin: 0 auto; background: #fff; border-radius: var(--radius-large); padding: 30px; border: 1.5px solid var(--border-color); }
        .selection-box { border: 1px solid var(--border-color); border-radius: 20px; padding: 15px; margin-bottom: 20px; display: flex; justify-content: space-around; flex-wrap: wrap; background: var(--bg-cream); }
        .item { width: 30%; cursor: pointer; margin-bottom: 10px; text-align: center; position: relative; }
        .item img { width: 70px; height: 70px; object-fit: contain; pointer-events: none; transition: 0.2s; }
        .item.active img { transform: scale(1.1); }
        .item.active::after { content: '✔'; position: absolute; top: -5px; right: 10px; background: #000; color: #fff; width: 20px; height: 20px; border-radius: 50%; font-size: 10px; line-height: 20px; }

        .knotted-btn {
            width: 100%;
            padding: 18px;
            background: var(--knotted-yellow);
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 0 #D4B100;
            transition: 0.1s;
        }
        .knotted-btn:active { transform: translateY(3px); box-shadow: none; }

        #resultModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 30px; border-radius: var(--radius-large); text-align: center; width: 300px; }

        /* 📱 반응형 최적화 */
        @media (max-width: 600px) {
            .logo { font-size: 20px; }
            nav a { margin-left: 10px; font-size: 12px; }
            .order-wrapper { width: 90%; padding: 20px; }
        }

        /* 🦶 ✨ 노티드 스타일 소셜 푸터 디자인 */
        footer {
            padding: 60px 5%; /* 더 넓은 여백 */
            background-color: #fff; /* 흰색 배경 */
            text-align: left; /* 왼쪽 정렬 */
            border-top: 1px solid #eee; /* 구분선 */
        }

        .footer-social {
            margin-bottom: 30px;
        }

        .footer-social h3 {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .footer-social ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .footer-social li {
            margin-bottom: 10px;
        }

        .footer-social a {
            text-decoration: none;
            color: #555;
            font-size: 13px;
            display: flex;
            align-items: center;
        }

        .footer-social a:hover {
            color: var(--knotted-yellow);
        }

        .footer-social img {
            width: 20px; /* 작은 아이콘 */
            height: 20px;
            margin-right: 10px;
            border-radius: 50%; /* 원형 아이콘 */
        }

        footer p {
            font-size: 12px;
            color: #888;
            margin: 0;
            line-height: 1.5;
        }
    </style>
</head>

            </ul>
        </div>
        <p>@ lo_ong._</p>
