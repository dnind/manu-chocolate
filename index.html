<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANU BARK CHOCOLATE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>MANU</h1>
            <p>BARK CHOCOLATE</title>
        </header>

        <section class="result-section">
            <div class="image-frame">
                <img id="chocolate-result" src="images/default.jpg" alt="나만의 바크 초콜릿">
            </div>
        </section>

        <section class="selection-section">
            <h3>< BASE ></h3>
            <div class="base-options">
                <label><input type="radio" name="base" value="milk" checked> MILK</label>
                <label><input type="radio" name="base" value="strawberry"> STRAWBERRY</label>
                <label><input type="radio" name="base" value="white"> WHITE</label>
            </div>

            <hr>

            <h3>< TOPPING ></h3>
            <div class="topping-options">
                <label><input type="checkbox" class="topping" value="oreo"> OREO</label>
                <label><input type="checkbox" class="topping" value="lotus"> LOTUS</label>
                <label><input type="checkbox" class="topping" value="marsh"> MARSHMALLOW</label>
                <label><input type="checkbox" class="topping" value="pretzel"> PRETZEL</label>
                <label><input type="checkbox" class="topping" value="nuts"> NUTS</label>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
