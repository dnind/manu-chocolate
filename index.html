<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANU BARK CHOCOLATE</title>
    <style>
        body {
            margin: 0;
            background-color: #e5e2d9; /* 외부 배경색 */
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 0;
        }

        .container {
            width: 380px;
            background: #f3f0e7; /* 내부 배경색 */
            border: 1.5px solid #b5b0a3;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 { font-size: 45px; margin: 0; letter-spacing: 8px; font-weight: 900; color: #000; }
        .header p { font-size: 15px; margin: 5px 0 25px; letter-spacing: 2px; border-bottom: 2.5px solid #000; display: inline-block; padding-bottom: 3px; }

        .section-title { font-size: 18px; text-align: left; margin: 15px 0 10px; font-weight: bold; padding-left: 5px; }
        
        /* ✨ 박스 안쪽도 동일한 색으로 수정 (#f3f0e7) */
        .selection-box {
            border: 1px solid #b5b0a3;
            border-radius: 12px;
            padding: 20px 5px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            background: #f3f0e7; /* 기존 흰색에서 수정됨 */
        }

        .item {
            width: 30%;
            cursor: pointer;
            margin-bottom: 10px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .item img { 
            width: 80px; 
            height: 80px; 
            object-fit: contain; 
            pointer-events: none; 
            transition: transform 0.2s;
        }

        .item p { font-size: 11px; margin-top: 8px; font-weight: bold; color: #333; pointer-events: none; }

        /* ✅ 선택 시 효과 */
        .item.active img { transform: scale(1.1); }
        .item.active::after {
            content: '✔';
            position: absolute;
            top: -10px; right: 5px;
            background: #000; color: #fff;
            width: 22px; height: 22px;
            border-radius: 50%; font-size: 12px; line-height: 22px;
        }

        .order-btn {
            margin-top: 20px;
            width: 100%;
            padding: 18px;
            background: #000;
            color: #fff;
            border: none;
            font-weight: bold;
            letter-spacing: 3px;
            cursor: pointer;
            font-size: 16px;
        }

        .insta-id { margin-top: 30px; font-size: 13px; color: #555; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="container">
        </div>
</body>
</html>
